name: Deploy SPA to Local AWS (Floci)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      # Se eliminó por completo el bloque de "Configure AWS credentials" de aquí

      - name: Deploy to S3 Bucket via Ngrok Tunnel
        run: |
          aws --endpoint-url=${{ secrets.AWS_ENDPOINT_URL }} s3 sync dist/ s3://mi-bucket-frontend --header "ngrok-skip-browser-warning: true"
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_SESSION_TOKEN: ""
