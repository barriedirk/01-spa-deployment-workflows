name: Deploy SPA to Local AWS (Floci)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Deploy to S3 Bucket via Ngrok Tunnel
        run: |
          # 1. Crear el bucket por si Floci se reinició
          aws --endpoint-url=${{ secrets.AWS_ENDPOINT_URL }} s3 mb s3://mi-bucket-frontend || true

          # 2. Sincronizar usando la configuración global de la petición
          aws --endpoint-url=${{ secrets.AWS_ENDPOINT_URL }} s3 sync dist/ s3://mi-bucket-frontend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_SESSION_TOKEN: "" # Mantenemos esto vacío para evitar tokens corruptos en Floci
          AWS_HTTP_HEADERS: '{"ngrok-skip-browser-warning":"true"}'
